<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공책 RPG</title>
    <style>
      :root {
        --paper-width: min(86vw, 1120px);
        --paper-height: calc(var(--paper-width) * 0.49);
        --ink: #2d241c;
        --page-color: #f7f0e0;
      }

      /* 기본 화면 */
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #000 url("asset/img/background.png") center / cover no-repeat;
        font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
        color: var(--ink);
      }

      .paper-stage {
        position: relative;
        width: var(--paper-width);
        height: var(--paper-height);
        perspective: 1800px;
      }

      .page-content,
      .game-screen {
        position: absolute;
        inset: 5.2% 5.6%;
        display: grid;
        place-items: center;
        text-align: center;
      }

      /* 실용형 고퀄: 페이지 플립 레이어 */
      .page-flip {
        position: absolute;
        inset: 5.2% 5.6%;
        transform-origin: left center;
        transform-style: preserve-3d;
        transition: transform 900ms cubic-bezier(0.22, 0.9, 0.2, 1), filter 900ms ease;
        z-index: 5;
      }

      .page-flip.is-flipped {
        transform: rotateY(-172deg) translateZ(2px);
        filter: brightness(0.92);
      }

      /* 종이 앞면 */
      .page-front,
      .page-back {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        border-radius: 8px;
      }

      .page-front {
        background:
          linear-gradient(100deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0) 22%),
          linear-gradient(90deg, rgba(100, 70, 42, 0.08), rgba(100, 70, 42, 0) 12%),
          var(--page-color);
        box-shadow:
          0 16px 30px rgba(40, 24, 10, 0.22),
          inset -14px 0 20px rgba(90, 62, 34, 0.1);
      }

      /* 종이 뒷면 */
      .page-back {
        transform: rotateY(180deg);
        background:
          linear-gradient(90deg, rgba(90, 62, 34, 0.2), rgba(90, 62, 34, 0) 14%),
          #efe5d2;
      }

      /* 접힘 그림자(플립 중 강조) */
      .page-fold-shadow {
        position: absolute;
        inset: 5.2% 5.6%;
        pointer-events: none;
        opacity: 0;
        z-index: 4;
        transition: opacity 240ms ease;
        background: linear-gradient(90deg, rgba(15, 10, 5, 0.3), rgba(15, 10, 5, 0.04) 22%, transparent 45%);
      }

      .page-fold-shadow.active {
        opacity: 1;
      }

      .title-screen h1 {
        margin: 0 0 0.45rem;
        font-size: clamp(1.4rem, 3vw, 2.3rem);
      }

      .title-screen p {
        margin: 0 0 1rem;
        font-size: clamp(0.88rem, 1.5vw, 1rem);
        opacity: 0.78;
      }

      .start-button {
        border: 0;
        border-radius: 999px;
        padding: 0.78rem 1.2rem;
        background: #6a4e38;
        color: #fff;
        font-size: clamp(0.88rem, 1.3vw, 1rem);
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(60, 40, 20, 0.26);
      }

      .start-button:disabled {
        cursor: default;
        opacity: 0.8;
      }

      .game-screen {
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition: opacity 320ms ease, transform 320ms ease;
        z-index: 1;
      }

      .game-screen.active {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .version-badge {
        position: fixed;
        right: 12px;
        bottom: 12px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="paper-stage" aria-live="polite">
      <!-- 넘기는 페이지 자체를 별도 레이어로 두고 3D 회전 처리 -->
      <section class="page-flip" id="pageFlipLayer" aria-hidden="true">
        <div class="page-front"></div>
        <div class="page-back"></div>
      </section>
      <div class="page-fold-shadow" id="foldShadow"></div>

      <section class="page-content title-screen" id="titleScreen">
        <div>
          <h1>Notebook RPG</h1>
          <p>버튼을 눌러 공책 페이지를 넘기고 모험을 시작하세요.</p>
          <button class="start-button" id="startButton" type="button">시작하기</button>
        </div>
      </section>

      <section class="game-screen" id="gameScreen">
        <div>
          <h2>첫 장이 열렸습니다</h2>
          <p>이제 여기에 대화/선택지/스탯 UI를 붙이면 됩니다.</p>
        </div>
      </section>
    </main>

    <!-- 버전 정보: ver.0.0.0(YYMMDD-업데이트 주제) -->
    <div class="version-badge">ver.0.0.2(260430-고퀄실용형플립전환)</div>

    <script>
      // 실용형 고퀄: CSS 3D 전환 + 그림자 타이밍 제어
      const startButton = document.getElementById('startButton');
      const titleScreen = document.getElementById('titleScreen');
      const gameScreen = document.getElementById('gameScreen');
      const pageFlipLayer = document.getElementById('pageFlipLayer');
      const foldShadow = document.getElementById('foldShadow');

      startButton.addEventListener('click', () => {
        startButton.disabled = true;
        startButton.textContent = '넘기는 중...';

        // 그림자를 먼저 켜서 시작 순간의 깊이감을 줍니다.
        foldShadow.classList.add('active');

        // 브라우저 렌더 프레임 1회 뒤 플립 클래스를 붙여 전환 시작
        requestAnimationFrame(() => {
          pageFlipLayer.classList.add('is-flipped');
        });
      });

      pageFlipLayer.addEventListener('transitionend', (event) => {
        if (event.propertyName !== 'transform') {
          return;
        }

        // 넘김 완료 후 타이틀 페이지를 숨기고, 실제 게임 화면 노출
        titleScreen.style.display = 'none';
        gameScreen.classList.add('active');

        // 플립 레이어/그림자는 잔상 없이 숨김 처리
        pageFlipLayer.style.display = 'none';
        foldShadow.classList.remove('active');

        startButton.disabled = false;
        startButton.textContent = '시작하기';
      });
    </script>
  </body>
</html>
